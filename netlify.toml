# Netlify build configuration for the Mastra IOC Triage app.
#
# The functions directory, bundler settings, and routing are generated
# automatically by @mastra/deployer-netlify (Netlify Frameworks API ->
# .netlify/v1/config.json) during `npm run build`. This file only needs to
# tell Netlify how to build the project.

[build]
  command = "npm run build"

[build.environment]
  # Match the project's engines requirement (package.json: node >=22.13.0).
  NODE_VERSION = "22.13.0"
